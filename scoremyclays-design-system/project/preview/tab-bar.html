<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bone-100);margin:0;font-family:var(--font-body)">
<style>
  .tb { background:var(--bone-0); border-top:1px solid var(--border-1); border-radius:16px; box-shadow:var(--shadow-md); display:flex; padding:10px 0 14px; }
  .tb__item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:4px; color:var(--fg-3); font-size:11px; font-weight:500; padding:6px 0; }
  .tb__item--active { color:var(--field-700); font-weight:700; }
  .tb__icon { width:24px; height:24px; display:flex; align-items:center; justify-content:center; }
  .tb__icon svg { width:24px; height:24px; display:block; }
  .tb__indicator { width:18px; height:3px; background:var(--field-700); border-radius:2px; margin-top:2px; }
  .tb__indicator--hidden { background:transparent; }
</style>

<div class="tb">
  <div class="tb__item tb__item--active">
    <div class="tb__icon">
      <!-- Home -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
    </div>
    <div>Home</div>
    <div class="tb__indicator"></div>
  </div>
  <div class="tb__item">
    <div class="tb__icon">
      <!-- Stats (bar chart) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10"/><path d="M12 20V4"/><path d="M20 20v-7"/></svg>
    </div>
    <div>Stats</div>
    <div class="tb__indicator tb__indicator--hidden"></div>
  </div>
  <div class="tb__item">
    <div class="tb__icon">
      <!-- Social (users) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div>Social</div>
    <div class="tb__indicator tb__indicator--hidden"></div>
  </div>
  <div class="tb__item">
    <div class="tb__icon">
      <!-- Profile (user) -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <div>Profile</div>
    <div class="tb__indicator tb__indicator--hidden"></div>
  </div>
</div>
<div style="margin-top:12px;font-size:12px;color:var(--fg-3);text-align:center">Bottom tab bar · Lucide-style line icons, uniform 24×24 · active tab uses field-green + 3px indicator</div>
</body></html>

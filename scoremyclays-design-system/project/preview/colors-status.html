<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  <div style="padding:14px;background:var(--hit-bg);border:1px solid var(--hit);border-radius:12px"><div style="width:28px;height:28px;background:var(--hit);border-radius:8px;margin-bottom:8px"></div><div style="font-size:13px;font-weight:600;color:var(--hit)">HIT</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px">#2c8a3f</div></div>
  <div style="padding:14px;background:var(--miss-bg);border:1px solid var(--miss);border-radius:12px"><div style="width:28px;height:28px;background:var(--miss);border-radius:8px;margin-bottom:8px"></div><div style="font-size:13px;font-weight:600;color:var(--miss)">MISS</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px">#b42318</div></div>
  <div style="padding:14px;background:var(--nobird-bg);border:1px solid var(--nobird);border-radius:12px"><div style="width:28px;height:28px;background:var(--nobird);border-radius:8px;margin-bottom:8px"></div><div style="font-size:13px;font-weight:600;color:var(--nobird)">No Bird</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px">#d96515</div></div>
  <div style="padding:14px;background:#fef1ef;border:1px solid var(--live);border-radius:12px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="width:10px;height:10px;background:var(--live);border-radius:50%;box-shadow:0 0 0 3px rgba(217,63,43,0.25)"></span></div><div style="font-size:13px;font-weight:600;color:var(--live);letter-spacing:0.08em">● LIVE</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px">#d93f2b</div></div>
</div>
<div style="display:flex;gap:12px;margin-top:14px">
  <div style="flex:1;padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-1);border-radius:12px;display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--medal-gold);border-radius:50%"></span><div><div style="font-size:12px;font-weight:600">Gold</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#c8a24a</div></div></div>
  <div style="flex:1;padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-1);border-radius:12px;display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--medal-silver);border-radius:50%"></span><div><div style="font-size:12px;font-weight:600">Silver</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#a8a8a8</div></div></div>
  <div style="flex:1;padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-1);border-radius:12px;display:flex;align-items:center;gap:10px"><span style="width:24px;height:24px;background:var(--medal-bronze);border-radius:50%"></span><div><div style="font-size:12px;font-weight:600">Bronze</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">#9a6b3e</div></div></div>
  <div style="flex:1;padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-1);border-radius:12px;display:flex;align-items:center;gap:10px"><span style="color:var(--positive);font-weight:700">↑ +12%</span><span style="color:var(--negative);font-weight:700">↓ −8%</span></div>
</div>
</body></html>

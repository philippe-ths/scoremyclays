<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
<!-- Recent round card -->
<div style="padding:18px;background:var(--bone-0);border:1px solid var(--border-1);border-radius:16px;box-shadow:var(--shadow-sm)">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
    <div>
      <div style="font-size:15px;font-weight:600;color:var(--fg-1)">West Kent SS</div>
      <div style="font-size:13px;color:var(--fg-3);margin-top:2px">Yesterday · Sporting</div>
    </div>
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--field-700);font-weight:700;background:var(--field-100);padding:3px 8px;border-radius:999px">78%</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:10px">
    <span class="sc-score" style="font-size:40px;color:var(--field-700)">39</span>
    <span style="color:var(--fg-3);font-family:var(--font-mono);font-size:18px">/50</span>
  </div>
</div>
<!-- Stat card -->
<div style="padding:18px;background:var(--field-700);color:var(--bone-50);border-radius:16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden">
  <div class="sc-label" style="color:rgba(255,255,255,0.65);margin-bottom:8px">Hit Rate · 30d</div>
  <div style="display:flex;align-items:baseline;gap:8px">
    <span class="sc-score" style="font-size:44px;color:var(--bone-0)">74</span>
    <span style="font-family:var(--font-mono);font-size:20px;color:var(--bone-200)">%</span>
  </div>
  <div style="margin-top:10px;font-size:13px;color:var(--field-200)"><span style="color:#c8e3b8;font-weight:700">↑ +3%</span> vs Last Month</div>
</div>
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:20px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="background:var(--bone-0);border:1px solid var(--border-1);border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)">
<div style="display:flex;align-items:center;padding:14px 16px;gap:14px;border-bottom:1px solid var(--border-1)">
  <div style="width:32px;height:32px;border-radius:50%;background:var(--medal-gold);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:var(--font-mono)">1</div>
  <div style="width:40px;height:40px;border-radius:50%;background:var(--field-200)"></div>
  <div style="flex:1"><div style="font-weight:600;font-size:15px">David Austin-White</div><div style="font-size:12px;color:var(--fg-3)">West Kent SS</div></div>
  <div class="sc-mono" style="font-size:22px;font-weight:700;color:var(--field-700)">82%</div>
</div>
<div style="display:flex;align-items:center;padding:14px 16px;gap:14px;border-bottom:1px solid var(--border-1);background:var(--field-50)">
  <div style="width:32px;height:32px;border-radius:50%;background:var(--medal-silver);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:var(--font-mono)">2</div>
  <div style="width:40px;height:40px;border-radius:50%;background:var(--clay-200)"></div>
  <div style="flex:1"><div style="font-weight:600;font-size:15px">Ian Marr <span style="font-size:11px;color:var(--field-700);font-weight:700;background:var(--field-100);padding:2px 6px;border-radius:999px;margin-left:4px">YOU</span></div><div style="font-size:12px;color:var(--fg-3)">West Kent SS</div></div>
  <div class="sc-mono" style="font-size:22px;font-weight:700;color:var(--field-700)">74%</div>
</div>
<div style="display:flex;align-items:center;padding:14px 16px;gap:14px">
  <div style="width:32px;height:32px;border-radius:50%;background:var(--medal-bronze);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;font-family:var(--font-mono)">3</div>
  <div style="width:40px;height:40px;border-radius:50%;background:var(--bone-300)"></div>
  <div style="flex:1"><div style="font-weight:600;font-size:15px">Steve Cox</div><div style="font-size:12px;color:var(--fg-3)">JJ's Clay Shooting</div></div>
  <div class="sc-mono" style="font-size:22px;font-weight:700;color:var(--fg-2)">71%</div>
</div>
</div>
</body></html>

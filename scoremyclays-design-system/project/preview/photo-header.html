<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:20px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm);position:relative;height:200px;background:linear-gradient(135deg,#4a7d38 0%,#2c4e22 50%,#1c3218 100%)">
  <!-- faux photo overlay -->
  <div style="position:absolute;inset:0;background:
    radial-gradient(ellipse at 30% 20%, rgba(217,165,86,0.25) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(28,50,24,0.5) 0%, transparent 40%),
    linear-gradient(180deg, rgba(35,63,29,0.3) 0%, rgba(35,63,29,0.0) 30%, rgba(35,63,29,0.75) 100%);
    mix-blend-mode:multiply;"></div>
  <div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(15,29,13,0.8) 100%)"></div>
  <div style="position:absolute;left:20px;bottom:18px;right:20px;color:var(--bone-50)">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.1em;color:var(--field-200);text-transform:uppercase;margin-bottom:6px">⭐ 4.8 · 15 stands · Sporting, Trap</div>
    <div style="font-family:var(--font-display);font-weight:700;font-size:28px;line-height:1.1">West Kent<br>Shooting School</div>
  </div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--fg-3)">Golden-hour photo + green duotone multiply + bottom protection gradient · title in serif bone-white</div>
</body></html>

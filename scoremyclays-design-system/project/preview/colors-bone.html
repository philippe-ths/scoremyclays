<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0">
<div style="display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid var(--border-1)">
  <div style="flex:1;background:var(--bone-0);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">0</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#ffffff</div></div>
  <div style="flex:1;background:var(--bone-50);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:700">50 ★</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#faf8f3</div></div>
  <div style="flex:1;background:var(--bone-100);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">100</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#f2ede2</div></div>
  <div style="flex:1;background:var(--bone-200);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">200</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#e6dfcd</div></div>
  <div style="flex:1;background:var(--bone-300);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">300</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#d2c9b2</div></div>
  <div style="flex:1;background:var(--bone-400);padding:16px 10px;color:var(--bone-900)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">400</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.7;margin-top:4px">#a89f86</div></div>
  <div style="flex:1;background:var(--bone-500);padding:16px 10px;color:var(--bone-0)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">500</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:4px">#7c7460</div></div>
  <div style="flex:1;background:var(--bone-600);padding:16px 10px;color:var(--bone-0)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">600</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:4px">#5a5445</div></div>
  <div style="flex:1;background:var(--bone-700);padding:16px 10px;color:var(--bone-0)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">700</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:4px">#403b30</div></div>
  <div style="flex:1;background:var(--bone-800);padding:16px 10px;color:var(--bone-0)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">800</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:4px">#2a2720</div></div>
  <div style="flex:1;background:var(--bone-900);padding:16px 10px;color:var(--bone-0)"><div style="font-family:var(--font-mono);font-size:11px;font-weight:600">900</div><div style="font-family:var(--font-mono);font-size:10px;opacity:.9;margin-top:4px">#18160f</div></div>
</div>
<div style="margin-top:14px;font-family:var(--font-body);font-size:13px;color:var(--fg-2)">
  <strong style="color:var(--fg-1)">Bone</strong> · Warm paper neutrals. 50 is the default app background — not cold white.
</div>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:flex;gap:16px;align-items:flex-start">
<div style="flex:1">
<label class="sc-label" style="display:block;margin-bottom:6px">Shooting Ground</label>
<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-2);border-radius:10px;font-size:15px;color:var(--fg-1)">West Kent Shooting School <span style="color:var(--fg-3)">▼</span></div>
<label class="sc-label" style="display:block;margin:14px 0 6px">Search</label>
<div style="padding:12px 14px;background:var(--bone-0);border:1px solid var(--border-2);border-radius:10px;color:var(--fg-4);font-size:15px">🔍  Search grounds…</div>
</div>
<div style="flex:1">
<label class="sc-label" style="display:block;margin-bottom:8px">Discipline</label>
<div style="display:flex;flex-wrap:wrap;gap:8px">
<span style="padding:9px 16px;background:var(--field-700);color:var(--bone-0);border-radius:999px;font-size:14px;font-weight:600">Sporting</span>
<span style="padding:9px 16px;background:var(--bone-0);color:var(--fg-1);border:1px solid var(--border-2);border-radius:999px;font-size:14px;font-weight:500">Trap</span>
<span style="padding:9px 16px;background:var(--bone-0);color:var(--fg-1);border:1px solid var(--border-2);border-radius:999px;font-size:14px;font-weight:500">Skeet</span>
<span style="padding:9px 16px;background:var(--bone-0);color:var(--fg-1);border:1px solid var(--border-2);border-radius:999px;font-size:14px;font-weight:500">FITASC</span>
</div>
<label class="sc-label" style="display:block;margin:14px 0 8px">Tags</label>
<div style="display:flex;flex-wrap:wrap;gap:6px">
<span style="padding:4px 10px;background:var(--field-100);color:var(--field-800);border-radius:999px;font-size:12px;font-weight:600">● Live</span>
<span style="padding:4px 10px;background:var(--clay-100);color:var(--clay-700);border-radius:999px;font-size:12px;font-weight:600">New</span>
<span style="padding:4px 10px;background:var(--bone-100);color:var(--fg-2);border-radius:999px;font-size:12px;font-weight:600">15 stands</span>
</div>
</div>
</div>
</body></html>

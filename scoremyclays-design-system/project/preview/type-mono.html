<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:28px;background:var(--bg);margin:0;display:flex;align-items:center;gap:36px">
<div>
  <div class="sc-score" style="color:var(--field-700)">39<span style="color:var(--fg-3);font-weight:500">/50</span></div>
  <div class="sc-label" style="margin-top:6px">Round Score</div>
</div>
<div>
  <div class="sc-score" style="color:var(--field-700)">74<span style="font-size:0.5em;color:var(--fg-3);margin-left:2px">%</span></div>
  <div class="sc-label" style="margin-top:6px">Hit Rate</div>
</div>
<div style="flex:1">
  <div class="sc-mono" style="font-size:18px;color:var(--fg-1);font-weight:600">CPSA: A1234567</div>
  <div class="sc-mono" style="font-size:14px;color:var(--fg-2);margin-top:6px">09:30 · Tee Time</div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3);margin-top:10px">JetBrains Mono · 500–700 · tabular-nums</div>
</div>
</body></html>

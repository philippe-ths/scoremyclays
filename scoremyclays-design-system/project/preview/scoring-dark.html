<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:20px;background:var(--bone-100);margin:0;font-family:var(--font-body)">
<div style="background:var(--powder-950);color:var(--bone-50);padding:20px 18px 18px;border-radius:16px">
<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--bone-400);margin-bottom:14px">
  <span class="sc-mono">9:41</span>
  <span style="color:var(--field-300)">● Offline Ready</span>
</div>
<div style="font-size:13px;color:var(--bone-400);margin-bottom:4px">Stand 3 of 10</div>
<div style="font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--bone-0);margin-bottom:18px">The Tower</div>
<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px">
  <span class="sc-score" style="color:var(--bone-0);font-size:56px">23</span>
  <span style="font-family:var(--font-mono);color:var(--bone-400);font-size:16px">of 30 · 77%</span>
</div>
<div style="display:flex;gap:8px">
  <button style="flex:1;padding:20px;background:var(--hit);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:16px;letter-spacing:0.06em">HIT</button>
  <button style="flex:1;padding:20px;background:var(--miss);color:#fff;border:none;border-radius:14px;font-weight:800;font-size:16px;letter-spacing:0.06em">MISS</button>
  <button style="flex:1;padding:20px;background:var(--powder-700);color:var(--bone-0);border:none;border-radius:14px;font-weight:800;font-size:15px">No Bird</button>
</div>
</div>
<div style="margin-top:10px;font-size:12px;color:var(--fg-3);text-align:center">Dark mode · edge-to-edge · XL targets for gloved hands · offline indicator</div>
</body></html>

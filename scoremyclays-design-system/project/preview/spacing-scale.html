<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:flex;flex-direction:column;gap:8px">
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">1</div><div style="background:var(--field-700);height:14px;width:4px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">4px</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">2</div><div style="background:var(--field-700);height:14px;width:8px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">8px</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">3</div><div style="background:var(--field-700);height:14px;width:12px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">12px</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">4</div><div style="background:var(--field-700);height:14px;width:16px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">16px · default gap</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">6</div><div style="background:var(--field-700);height:14px;width:24px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">24px · card padding</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">8</div><div style="background:var(--field-700);height:14px;width:32px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">32px · section gap</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">12</div><div style="background:var(--field-700);height:14px;width:48px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">48px · min tap target</div></div>
<div style="display:flex;align-items:center;gap:12px"><div style="width:40px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);font-weight:600">16</div><div style="background:var(--field-700);height:14px;width:64px;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2)">64px</div></div>
</div>
</body></html>

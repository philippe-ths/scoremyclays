<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:32px 24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:flex;gap:20px;align-items:center">
<div style="text-align:center"><div style="width:90px;height:60px;background:var(--bone-0);border-radius:12px;box-shadow:var(--shadow-xs);margin-bottom:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">xs</div></div>
<div style="text-align:center"><div style="width:90px;height:60px;background:var(--bone-0);border-radius:12px;box-shadow:var(--shadow-sm);margin-bottom:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">sm · default card</div></div>
<div style="text-align:center"><div style="width:90px;height:60px;background:var(--bone-0);border-radius:12px;box-shadow:var(--shadow-md);margin-bottom:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">md · hover</div></div>
<div style="text-align:center"><div style="width:90px;height:60px;background:var(--bone-0);border-radius:12px;box-shadow:var(--shadow-lg);margin-bottom:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">lg · popovers</div></div>
<div style="text-align:center"><div style="width:90px;height:60px;background:var(--bone-0);border-radius:12px;box-shadow:var(--shadow-xl);margin-bottom:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">xl · sheets</div></div>
</div>
<div style="margin-top:18px;font-size:12px;color:var(--fg-2)">All shadows use warm-tinted black <code style="font-family:var(--font-mono);font-size:11px;background:var(--bone-100);padding:2px 6px;border-radius:4px">rgba(24,22,15,...)</code> — never cold pure black.</div>
</body></html>

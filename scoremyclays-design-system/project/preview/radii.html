<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:24px;background:var(--bg);margin:0;font-family:var(--font-body)">
<div style="display:flex;gap:14px;align-items:flex-end">
<div style="text-align:center"><div style="width:72px;height:72px;background:var(--field-100);border:1px solid var(--field-300);border-radius:6px;margin-bottom:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">sm · 6</div></div>
<div style="text-align:center"><div style="width:72px;height:72px;background:var(--field-100);border:1px solid var(--field-300);border-radius:10px;margin-bottom:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">md · 10</div><div style="font-size:10px;color:var(--fg-4)">inputs</div></div>
<div style="text-align:center"><div style="width:72px;height:72px;background:var(--field-100);border:1px solid var(--field-300);border-radius:16px;margin-bottom:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">lg · 16</div><div style="font-size:10px;color:var(--fg-4)">cards</div></div>
<div style="text-align:center"><div style="width:72px;height:72px;background:var(--field-100);border:1px solid var(--field-300);border-radius:20px;margin-bottom:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">xl · 20</div></div>
<div style="text-align:center"><div style="width:72px;height:72px;background:var(--field-100);border:1px solid var(--field-300);border-radius:28px;margin-bottom:6px"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">2xl · 28</div><div style="font-size:10px;color:var(--fg-4)">sheets</div></div>
<div style="text-align:center"><div style="width:140px;height:48px;background:var(--field-700);border-radius:999px;margin-bottom:6px;display:flex;align-items:center;justify-content:center;color:var(--bone-0);font-weight:600;font-size:14px">Start Scoring</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">pill</div></div>
</div>
</body></html>
